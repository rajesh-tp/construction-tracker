<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- House roof -->
  <polygon points="256,80 420,220 92,220" fill="none" stroke="#ffffff" stroke-width="28" stroke-linejoin="round"/>
  <!-- House body -->
  <rect x="132" y="220" width="248" height="200" rx="8" fill="none" stroke="#ffffff" stroke-width="24"/>
  <!-- Door -->
  <rect x="216" y="300" width="80" height="120" rx="6" fill="none" stroke="#ffffff" stroke-width="18"/>
  <!-- Door knob -->
  <circle cx="278" cy="365" r="8" fill="#ffffff"/>
  <!-- Ruler/measure marks on left side (construction element) -->
  <line x1="92" y1="180" x2="92" y2="420" stroke="#fbbf24" stroke-width="16" stroke-linecap="round"/>
  <line x1="92" y1="200" x2="112" y2="200" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
  <line x1="92" y1="250" x2="120" y2="250" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
  <line x1="92" y1="300" x2="112" y2="300" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
  <line x1="92" y1="350" x2="120" y2="350" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
  <line x1="92" y1="400" x2="112" y2="400" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>
  <!-- INR symbol (₹) top right -->
  <text x="390" y="160" font-family="Arial,sans-serif" font-size="100" font-weight="bold" fill="#fbbf24" text-anchor="middle">&#8377;</text>
</svg>
